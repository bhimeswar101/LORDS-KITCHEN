<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lords Kitchen | Reservation Management Hub</title>
  <meta name="description" content="Chef Lords's kitchen operations dashboard for viewing active table bookings, custom instructions, and dish pre-orders.">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Dashboard Specific Overrides and Additions */
    .dashboard-container {
      padding-top: 120px;
      padding-bottom: 80px;
      min-height: 100vh;
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 20px;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .metric-card {
      background-color: var(--bg-card);
      border: 1px solid rgba(159, 232, 112, 0.05);
      border-radius: var(--radius-md);
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: var(--transition-smooth);
    }

    .metric-card:hover {
      border-color: rgba(159, 232, 112, 0.2);
      box-shadow: var(--shadow-neon);
      transform: translateY(-3px);
    }

    .metric-value {
      font-size: 36px;
      font-family: var(--font-display);
      color: var(--color-primary);
      font-weight: 700;
      line-height: 1.2;
      margin-top: 8px;
    }

    .metric-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-text-gray);
    }

    .metric-icon {
      position: absolute;
      right: 20px;
      bottom: 20px;
      font-size: 32px;
      opacity: 0.15;
      color: var(--color-primary);
    }

    /* Filter Controls */
    .filter-panel {
      background-color: var(--bg-card);
      border: 1px solid rgba(159, 232, 112, 0.05);
      border-radius: var(--radius-md);
      padding: 24px;
      margin-bottom: 30px;
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 16px;
      align-items: end;
    }

    @media (max-width: 900px) {
      .filter-panel {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 600px) {
      .filter-panel {
        grid-template-columns: 1fr;
      }
    }

    /* Bookings Grid */
    .bookings-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .booking-row-card {
      background-color: var(--bg-card);
      border: 1px solid rgba(159, 232, 112, 0.05);
      border-radius: var(--radius-md);
      padding: 24px;
      transition: var(--transition-smooth);
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .booking-row-card:hover {
      border-color: rgba(159, 232, 112, 0.15);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .booking-row-card.cancelled {
      border-color: rgba(255, 100, 100, 0.1);
      opacity: 0.6;
    }

    .booking-row-card.cancelled:hover {
      box-shadow: none;
    }

    .booking-main-info {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      border-bottom: 1px solid rgba(159, 232, 112, 0.08);
      padding-bottom: 16px;
    }

    .guest-detail h3 {
      font-size: 22px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .guest-detail p {
      color: var(--color-text-gray);
      font-size: 14px;
    }

    .booking-meta-badges {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .meta-badge {
      font-size: 12px;
      padding: 6px 14px;
      border-radius: var(--radius-full);
      font-weight: 500;
      background-color: var(--bg-obsidian);
      border: 1px solid rgba(159, 232, 112, 0.1);
    }

    .meta-badge.highlight {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    .status-badge {
      padding: 6px 14px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-badge.confirmed {
      background-color: var(--color-forest);
      color: var(--color-primary);
      border: 1px solid var(--color-primary);
    }

    .status-badge.cancelled {
      background-color: rgba(255, 80, 80, 0.1);
      color: #FF8080;
      border: 1px solid #FF8080;
    }

    /* Booking Grid columns */
    .booking-content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 768px) {
      .booking-content-grid {
        grid-template-columns: 1fr;
      }
    }

    .chef-notes-box {
      background-color: rgba(9, 14, 10, 0.5);
      border-left: 4px solid var(--color-primary);
      padding: 16px;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }

    .chef-notes-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-primary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .preorders-box {
      background-color: rgba(9, 14, 10, 0.5);
      border: 1px solid rgba(159, 232, 112, 0.05);
      border-radius: var(--radius-sm);
      padding: 16px;
    }

    .preorders-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-white);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid rgba(159, 232, 112, 0.08);
      padding-bottom: 6px;
    }

    .preorders-list {
      list-style-type: square;
      padding-left: 20px;
      margin: 0;
    }

    .preorders-list li {
      font-size: 13.5px;
      margin-bottom: 6px;
      color: var(--color-text-lightgreen);
    }

    .preorders-list li strong {
      color: var(--color-primary);
    }

    .booking-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 10px;
    }

    .btn-cancel {
      background-color: rgba(255, 80, 80, 0.1);
      color: #FF8080;
      border: 1px solid rgba(255, 80, 80, 0.3);
      padding: 8px 20px;
      font-size: 13.5px;
      cursor: pointer;
      border-radius: var(--radius-full);
      font-weight: 600;
      font-family: var(--font-body);
      transition: var(--transition-smooth);
    }

    .btn-cancel:hover {
      background-color: #FF5050;
      color: #FFFFFF;
      border-color: #FF5050;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-gray);
      background-color: var(--bg-card);
      border-radius: var(--radius-md);
      border: 1px dashed rgba(159, 232, 112, 0.1);
    }

    .empty-state h3 {
      font-size: 22px;
      color: var(--color-text-white);
      margin-bottom: 10px;
    }

    /* Change Password Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(9, 14, 10, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: var(--transition-smooth);
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      background-color: var(--bg-card);
      border: 1px solid rgba(159, 232, 112, 0.15);
      border-radius: var(--radius-lg);
      padding: 32px;
      width: 100%;
      max-width: 440px;
      transform: scale(0.9);
      transition: var(--transition-smooth);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), var(--shadow-neon);
    }

    .modal-overlay.active .modal-card {
      transform: scale(1);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      border-bottom: 1px solid rgba(159, 232, 112, 0.1);
      padding-bottom: 16px;
    }

    .modal-title {
      font-size: 20px;
      font-family: var(--font-display);
      color: var(--color-primary);
    }

    .modal-close-btn {
      background: none;
      border: none;
      color: var(--color-text-gray);
      font-size: 28px;
      cursor: pointer;
      transition: var(--transition-smooth);
      line-height: 1;
    }

    .modal-close-btn:hover {
      color: var(--color-primary);
    }

    .modal-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .btn-modal-submit {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: var(--radius-sm);
    }
  </style>
</head>
<body>

  <!-- TOAST NOTIFICATION -->
  <div id="toast" class="toast">
    <div class="toast-icon">✓</div>
    <div id="toast-message" class="toast-msg">Action completed successfully!</div>
  </div>

  <!-- NAVIGATION NAVBAR -->
  <header class="navbar">
    <div class="container navbar-container">
      <a href="/" class="logo">
        <div class="logo-icon">L</div>
        LORDS<span>KITCHEN</span>
      </a>
      <div class="nav-cta" style="display: flex; gap: 12px; align-items: center;">
        <a href="/index.html#reservation" class="btn btn-secondary btn-header-back">← Back to Main Website</a>
        <button id="btn-change-key" class="btn btn-secondary btn-header-back" style="border-color: rgba(159, 232, 112, 0.4);">🔑 Change Access Key</button>
        <button id="btn-logout" class="btn btn-forest btn-header-back">Logout</button>
      </div>
    </div>
  </header>

  <!-- MAIN DASHBOARD CONTENT -->
  <main class="container dashboard-container">
    
    <!-- HEADER -->
    <div class="dashboard-header">
      <div>
        <span class="section-tag">Chef Operations Hub</span>
        <h1 class="text-gradient" style="font-size: clamp(32px, 5vw, 54px);">RESERVATION TRACKING</h1>
      </div>
    </div>

    <!-- METRICS -->
    <div class="metrics-grid">
      <!-- Metric 1 -->
      <div class="metric-card">
        <div class="metric-title">Active Bookings</div>
        <div id="metric-active-count" class="metric-value">0</div>
        <div class="metric-icon">📅</div>
      </div>
      <!-- Metric 2 -->
      <div class="metric-card">
        <div class="metric-title">Total Seated Guests</div>
        <div id="metric-guest-count" class="metric-value">0</div>
        <div class="metric-icon">👥</div>
      </div>
      <!-- Metric 3 -->
      <div class="metric-card">
        <div class="metric-title">VIP Counter Bookings</div>
        <div id="metric-vip-count" class="metric-value">0</div>
        <div class="metric-icon">👑</div>
      </div>
      <!-- Metric 4 -->
      <div class="metric-card">
        <div class="metric-title">Total Food Pre-Orders</div>
        <div id="metric-preorder-count" class="metric-value">0</div>
        <div class="metric-icon">🍳</div>
      </div>
    </div>

    <!-- FILTER BAR -->
    <div class="filter-panel">
      <div class="form-group">
        <label for="filter-search">Search Guests</label>
        <input type="text" id="filter-search" placeholder="Search name, email, or code...">
      </div>
      <div class="form-group">
        <label for="filter-date">Date filter</label>
        <input type="date" id="filter-date">
      </div>
      <div class="form-group">
        <label for="filter-section">Lounge Section</label>
        <select id="filter-section">
          <option value="all">All Areas</option>
          <option value="Main Dining Hall">Main Dining Hall</option>
          <option value="Garden Terrace">Garden Terrace</option>
          <option value="Chef's Counter VIP">Chef's Counter VIP</option>
        </select>
      </div>
      <div class="form-group">
        <label for="filter-status">Booking Status</label>
        <select id="filter-status">
          <option value="all">All statuses</option>
          <option value="confirmed">Confirmed</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
    </div>

    <!-- BOOKINGS DISPLAY CONTAINER -->
    <div class="bookings-list" id="bookings-list-container">
      <div class="empty-state">
        <h3>Loading Reservations...</h3>
        <p>Connecting to database store.</p>
      </div>
    </div>

  </main>

  <!-- CHANGE PASSWORD MODAL -->
  <div id="change-key-modal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-header">
        <h3 class="modal-title">Change Admin Settings</h3>
        <button id="modal-close" class="modal-close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <form id="change-key-form" class="modal-form">
          <div class="form-group">
            <label for="current-password">Current Access Key</label>
            <input type="password" id="current-password" required placeholder="Enter current password to verify identity">
          </div>
          <div class="form-group" style="border-top: 1px solid rgba(159, 232, 112, 0.08); padding-top: 15px;">
            <label for="settings-email">Admin Email Address</label>
            <input type="email" id="settings-email" required placeholder="lordskitchen@gmail.com">
          </div>
          <div class="form-group">
            <label for="new-password">Change Access Key (Optional)</label>
            <input type="password" id="new-password" placeholder="Enter new password (leave blank to keep current)">
          </div>
          <div class="form-group">
            <label for="confirm-new-password">Confirm New Access Key</label>
            <input type="password" id="confirm-new-password" placeholder="Confirm new password">
          </div>
          <button type="submit" class="btn btn-primary btn-modal-submit">Update Settings</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    // State variables
    let allBookings = [];

    // DOM Elements
    const bookingsListContainer = document.getElementById("bookings-list-container");
    const searchFilter = document.getElementById("filter-search");
    const dateFilter = document.getElementById("filter-date");
    const sectionFilter = document.getElementById("filter-section");
    const statusFilter = document.getElementById("filter-status");

    // Metrics elements
    const activeCountEl = document.getElementById("metric-active-count");
    const guestCountEl = document.getElementById("metric-guest-count");
    const vipCountEl = document.getElementById("metric-vip-count");
    const preorderCountEl = document.getElementById("metric-preorder-count");

    // Toast Notification System
    const toast = document.getElementById("toast");
    const toastMessage = document.getElementById("toast-message");

    function showToast(message, isError = false) {
      toastMessage.textContent = message;
      if (isError) {
        toast.style.borderLeft = "4px solid #FF5050";
      } else {
        toast.style.borderLeft = "4px solid var(--color-primary)";
      }
      toast.classList.add("active");
      setTimeout(() => {
        toast.classList.remove("active");
      }, 4500);
    }

    // Core Loader
    async function loadBookings() {
      try {
        const res = await fetch('/api/bookings');
        if (res.status === 401) {
          window.location.href = '/login.html';
          return;
        }
        if (res.ok) {
          allBookings = await res.json();
          
          // Sort chronologically (newest date first, then by time slot)
          allBookings.sort((a, b) => {
            const dateCompare = b.date.localeCompare(a.date);
            if (dateCompare !== 0) return dateCompare;
            return a.time.localeCompare(b.time);
          });

          renderDashboard();
        } else {
          bookingsListContainer.innerHTML = `
            <div class="empty-state">
              <h3 style="color:#FF8080;">Database Error</h3>
              <p>Could not fetch bookings list from server.</p>
            </div>
          `;
        }
      } catch (err) {
        console.error("Error loading bookings:", err);
        bookingsListContainer.innerHTML = `
          <div class="empty-state">
            <h3 style="color:#FF8080;">Connection Error</h3>
            <p>Could not connect to the backend server.</p>
          </div>
        `;
      }
    }

    // Cancel Function
    async function cancelBooking(bookingId, code) {
      if (!confirm(`Are you sure you want to cancel booking code ${code}?`)) {
        return;
      }

      try {
        const res = await fetch('/api/bookings/cancel', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: bookingId })
        });
        
        if (res.status === 401) {
          showToast("Session expired. Redirecting to login...", true);
          setTimeout(() => {
            window.location.href = '/login.html';
          }, 1000);
          return;
        }

        const result = await res.json();
        
        if (res.ok && result.success) {
          showToast(`Booking ${code} cancelled successfully.`);
          await loadBookings();
        } else {
          showToast(`Error: ${result.error || 'Failed to cancel reservation'}`, true);
        }
      } catch (err) {
        console.error("Error cancelling booking:", err);
        showToast("Server connection error. Please try again.", true);
      }
    }

    // Metrics Updates
    function updateMetrics(bookings) {
      const activeBookings = bookings.filter(b => b.status === 'confirmed');
      
      const activeCount = activeBookings.length;
      
      const totalGuests = activeBookings.reduce((sum, b) => sum + (Number(b.guests) || 0), 0);
      
      const vipCount = activeBookings.filter(b => b.section === "Chef's Counter VIP").length;
      
      const totalPreorders = activeBookings.reduce((sum, b) => {
        const dishCount = b.preOrders ? b.preOrders.reduce((dSum, item) => dSum + (Number(item.quantity) || 0), 0) : 0;
        return sum + dishCount;
      }, 0);

      activeCountEl.textContent = activeCount;
      guestCountEl.textContent = totalGuests;
      vipCountEl.textContent = vipCount;
      preorderCountEl.textContent = totalPreorders;
    }

    // Display Renderer
    function renderDashboard() {
      // Calculate metrics based on ALL loaded bookings, not just the filtered ones
      updateMetrics(allBookings);

      // Apply filters
      const searchKey = searchFilter.value.toLowerCase().trim();
      const chosenDate = dateFilter.value;
      const chosenSection = sectionFilter.value;
      const chosenStatus = statusFilter.value;

      const filteredBookings = allBookings.filter(booking => {
        // Search matches Name, Email, or Confirmation Code
        const matchesSearch = !searchKey || 
          booking.name.toLowerCase().includes(searchKey) ||
          booking.email.toLowerCase().includes(searchKey) ||
          booking.code.toLowerCase().includes(searchKey);

        const matchesDate = !chosenDate || booking.date === chosenDate;
        
        const matchesSection = chosenSection === 'all' || booking.section === chosenSection;
        
        const matchesStatus = chosenStatus === 'all' || booking.status === chosenStatus;

        return matchesSearch && matchesDate && matchesSection && matchesStatus;
      });

      bookingsListContainer.innerHTML = "";

      if (filteredBookings.length === 0) {
        bookingsListContainer.innerHTML = `
          <div class="empty-state">
            <h3>No Bookings Found</h3>
            <p>Try resetting filters or changing the search keyword.</p>
          </div>
        `;
        return;
      }

      filteredBookings.forEach(booking => {
        const card = document.createElement("div");
        const isCancelled = booking.status === 'cancelled';
        card.className = `booking-row-card ${isCancelled ? 'cancelled' : ''}`;

        // Format Date
        const formattedDate = new Date(booking.date).toLocaleDateString("en-US", {
          weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
        });

        // Parse Table Number
        const tableNumberMap = {
          1: "T-01", 2: "T-02", 3: "T-03", 4: "T-04", 5: "T-05", 6: "T-06",
          7: "T-07", 8: "T-08", 9: "VIP-1", 10: "VIP-2", 11: "VIP-3", 12: "VIP-4"
        };
        const tableNum = tableNumberMap[booking.tableId] || `Table #${booking.tableId}`;

        // Preorders List html
        let preordersHtml = `<div class="preorders-box">
          <div class="preorders-title">Food Pre-Orders</div>
          <p style="font-size:13px; color:var(--color-text-gray); margin:0;">No pre-ordered dishes for this reservation.</p>
        </div>`;

        if (booking.preOrders && booking.preOrders.length > 0) {
          let listItems = booking.preOrders.map(item => {
            let addons = item.addons && item.addons.length > 0 ? ` (+${item.addons.join(", ")})` : "";
            let notes = item.chefInstructions ? ` [Chef Instructions: "${item.chefInstructions}"]` : "";
            return `<li><strong>${item.quantity}x</strong> ${item.title} (${item.spice})${addons}${notes}</li>`;
          }).join("");

          preordersHtml = `<div class="preorders-box">
            <div class="preorders-title">Food Pre-Orders</div>
            <ul class="preorders-list">
              ${listItems}
            </ul>
          </div>`;
        }

        // Notes html
        const notesHtml = booking.chefInstructions ? `
          <div class="chef-notes-box">
            <div class="chef-notes-title">Direct Notes for Chef Lords</div>
            <p style="font-size:13.5px; margin:0; font-style:italic;">"${booking.chefInstructions}"</p>
          </div>
        ` : `
          <div class="chef-notes-box" style="border-left-color: rgba(159,232,112,0.15);">
            <div class="chef-notes-title" style="color:var(--color-text-gray);">Notes for Chef Lords</div>
            <p style="font-size:13.5px; margin:0; color:var(--color-text-gray);">None provided.</p>
          </div>
        `;

        card.innerHTML = `
          <div class="booking-main-info">
            <div class="guest-detail">
              <h3>
                ${booking.name}
                <span class="status-badge ${booking.status}">${booking.status}</span>
              </h3>
              <p>${booking.email} | Created ${new Date(booking.createdAt).toLocaleString()}</p>
            </div>
            <div class="booking-meta-badges">
              <span class="meta-badge highlight">${booking.code}</span>
              <span class="meta-badge">${formattedDate} @ ${booking.time}</span>
              <span class="meta-badge">${booking.guests} Guests</span>
              <span class="meta-badge highlight">${tableNum} (${booking.section})</span>
            </div>
          </div>
          <div class="booking-content-grid">
            ${notesHtml}
            ${preordersHtml}
          </div>
          ${!isCancelled ? `
            <div class="booking-actions">
              <button class="btn-cancel" onclick="cancelBooking('${booking.id}', '${booking.code}')">Cancel Reservation</button>
            </div>
          ` : ''}
        `;

        bookingsListContainer.appendChild(card);
      });
    }

    // Attach Event Listeners
    searchFilter.addEventListener("input", renderDashboard);
    dateFilter.addEventListener("change", renderDashboard);
    sectionFilter.addEventListener("change", renderDashboard);
    statusFilter.addEventListener("change", renderDashboard);

    // Logout Handler
    const btnLogout = document.getElementById("btn-logout");
    if (btnLogout) {
      btnLogout.addEventListener("click", async () => {
        try {
          const res = await fetch('/api/logout', { method: 'POST' });
          if (res.ok) {
            showToast("Logged out successfully.");
            setTimeout(() => {
              window.location.href = '/login.html';
            }, 500);
          } else {
            showToast("Failed to logout. Please try again.", true);
          }
        } catch (err) {
          console.error("Error logging out:", err);
          showToast("Connection error.", true);
        }
      });
    }

    // Change Key Modal Handlers (Option B - Password & Email)
    const changeKeyModal = document.getElementById("change-key-modal");
    const btnChangeKey = document.getElementById("btn-change-key");
    const modalClose = document.getElementById("modal-close");
    const changeKeyForm = document.getElementById("change-key-form");
    const settingsEmailInput = document.getElementById("settings-email");

    if (btnChangeKey && changeKeyModal) {
      btnChangeKey.addEventListener("click", async () => {
        changeKeyForm.reset();
        
        // Fetch current settings (admin email)
        try {
          const res = await fetch('/api/admin/settings');
          if (res.ok) {
            const data = await res.json();
            if (data.email) {
              settingsEmailInput.value = data.email;
            }
          }
        } catch (err) {
          console.error("Error fetching admin settings:", err);
        }
        
        changeKeyModal.classList.add("active");
      });
    }

    if (modalClose && changeKeyModal) {
      modalClose.addEventListener("click", () => {
        changeKeyModal.classList.remove("active");
      });
    }

    if (changeKeyModal) {
      changeKeyModal.addEventListener("click", (e) => {
        if (e.target === changeKeyModal) {
          changeKeyModal.classList.remove("active");
        }
      });
    }

    if (changeKeyForm) {
      changeKeyForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const currentPassword = document.getElementById("current-password").value;
        const newPassword = document.getElementById("new-password").value;
        const confirmNewPassword = document.getElementById("confirm-new-password").value;
        const newEmail = settingsEmailInput.value;

        if (newPassword && newPassword.length < 4) {
          showToast("New password must be at least 4 characters long.", true);
          return;
        }

        if (newPassword && newPassword !== confirmNewPassword) {
          showToast("New passwords do not match.", true);
          return;
        }

        try {
          const res = await fetch('/api/admin/change-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ currentPassword, newPassword: newPassword || undefined, newEmail })
          });

          const data = await res.json();

          if (res.ok && data.success) {
            if (data.loggedOut) {
              showToast("Access key changed successfully! Logging out...");
              changeKeyModal.classList.remove("active");
              setTimeout(() => {
                window.location.href = '/login.html';
              }, 1500);
            } else {
              showToast("Admin settings updated successfully!");
              changeKeyModal.classList.remove("active");
            }
          } else {
            showToast(data.error || "Failed to update settings.", true);
          }
        } catch (err) {
          console.error("Error changing settings:", err);
          showToast("Server connection error.", true);
        }
      });
    }

    // Initial Load
    window.addEventListener("DOMContentLoaded", () => {
      loadBookings();
    });
  </script>

</body>
</html>
